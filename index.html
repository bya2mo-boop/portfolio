<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Portfolio">
<meta name="theme-color" content="#0a0b0f">
<title>Portfolio</title>
<style>
:root{--bg:#0a0b0f;--card:#12131a;--bdr:#1e2030;--txt:#e8e9ed;--dim:#7a7d8e;--mut:#4a4d5e;--acc:#6c8cff;--grn:#34d399;--red:#f87171;--amb:#fbbf24}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
body{max-width:480px;margin:0 auto;padding:env(safe-area-inset-top,16px) 16px 90px}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:16px;margin-bottom:10px}
.card-tap{cursor:pointer}.card-tap:active{background:#181a25}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
.chip{display:inline-flex;padding:3px 8px;border-radius:6px;font-size:12px;font-weight:600}
.chip-g{background:#34d39918;color:var(--grn)}.chip-a{background:#fbbf2418;color:var(--amb)}.chip-r{background:#f8717118;color:var(--red)}
.section{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;font-weight:500;margin-bottom:8px}
.nav{position:fixed;bottom:0;left:0;right:0;background:#12131aee;border-top:1px solid var(--bdr);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:6px 0 env(safe-area-inset-bottom,8px);z-index:100}
.nav-inner{display:flex;justify-content:space-around;max-width:480px;margin:0 auto}
.nav-btn{background:none;border:none;cursor:pointer;padding:4px 10px;color:var(--mut);font-family:inherit;font-size:13px;position:relative}
.nav-btn.active{color:var(--acc);font-weight:700}
.modal-bg{position:fixed;inset:0;background:#000b;z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{width:100%;max-width:480px;max-height:85vh;overflow-y:auto;background:var(--card);border-radius:20px 20px 0 0;padding:20px 16px env(safe-area-inset-bottom,20px);border:1px solid var(--bdr)}
.field{margin-bottom:10px}.field label{display:block;font-size:10px;color:var(--dim);text-transform:uppercase;margin-bottom:3px}
.field input,.field select{width:100%;background:#1a1b25;border:1px solid var(--bdr);border-radius:8px;color:var(--txt);font-family:ui-monospace,monospace;font-size:14px;padding:8px 10px;outline:none}
.field input:focus,.field select:focus{border-color:var(--acc)}
.btn{border:none;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-p{background:var(--acc);color:#fff;width:100%}.btn-d{background:var(--red);color:#fff}
.add-btn{background:#6c8cff15;border:1px dashed #6c8cff44;border-radius:12px;padding:12px;text-align:center;margin-top:10px;cursor:pointer;font-size:14px;color:var(--acc);font-weight:600}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes sp{to{transform:rotate(360deg)}}
.fade{animation:fu .3s ease both}.blink{animation:bl 2s infinite}
.spin{animation:sp 1s linear infinite;display:inline-block}
</style>
</head>
<body>

<script>

CTO:{sante:"7,1",positions:[{titre:"Alphabet",ticker:"GOOGL",qty:20,pru:237.34,cours:319.73,cible:275},{titre:"NVIDIA",ticker:"NVDA",qty:30,pru:180.03,cours:188.45,cible:175},{titre:"Nebius Group",ticker:"NBIS",qty:30,pru:90.73,cours:158.01,cible:105},{titre:"AST SpaceMobile",ticker:"ASTS",qty:45,pru:84.87,cours:98.50,cible:85},{titre:"Rocket Lab",ticker:"RKLB",qty:40,pru:73.10,cours:70.89,cible:65},{titre:"TSMC",ticker:"TSM",qty:5,pru:287.60,cours:370.60,cible:315},{titre:"Kraken Robotics",ticker:"KRKNF",qty:200,pru:5.82,cours:6.23,cible:5.10},{titre:"Oklo Inc.",ticker:"OKLO",qty:20,pru:64.06,cours:52.87},{titre:"Navitas Semi.",ticker:"NVTS",qty:100,pru:9.24,cours:9.76},{titre:"Redwire",ticker:"RDW",qty:100,pru:10.03,cours:9.76},{titre:"Ondas Holdings",ticker:"ONDS",qty:100,pru:10.39,cours:9.38},{titre:"D-Wave Quantum",ticker:"QBTS",qty:35,pru:17.25,cours:14.47}]},
PEA:{sante:"8,6",positions:[{titre:"Air Liquide",ticker:"AI",qty:30,pru:176.17,cours:187.50,cible:160},{titre:"Schneider Electric",ticker:"SU",qty:15,pru:244.39,cours:260.30,cible:225},{titre:"Vicat",ticker:"VCT",qty:25,pru:65.27,cours:66.00,cible:57.50},{titre:"Veolia",ticker:"VIE",qty:35,pru:32.10,cours:34.54,cible:32.20},{titre:"Wolters Kluwer",ticker:"WKL",qty:15,pru:64.23,cours:63.54,cible:55}]},
"Assurance Vie":{sante:"7,7",positions:[{titre:"DPAM B NewGems",ticker:"DPAM",qty:3.64,pru:267.99,cours:308.39},{titre:"GemEquity R",ticker:"GEM",qty:4.19,pru:233.04,cours:223.00},{titre:"BDL Rempart C",ticker:"BDL",qty:2.44,pru:206.43,cours:258.54}]},
PEE:{sante:"10,0",positions:[{titre:"CDC Monde ISR",ticker:"CDC-M",qty:209.63,pru:7.16,cours:15.22},{titre:"CDC Diversifié ISR",ticker:"CDC-D",qty:234.23,pru:6.40,cours:13.15},{titre:"CDC Euro ISR",ticker:"CDC-E",qty:113.54,pru:13.21,cours:17.28}]},
Crypto:{sante:"5,3",positions:[{titre:"Solana",ticker:"SOL",qty:21.30,pru:130.52,cours:81.88,cible:70},{titre:"Bitcoin",ticker:"BTC",qty:0.0212,pru:68213.68,cours:72331.85,cible:60000},{titre:"HyperEVM",ticker:"HYPE",qty:25.53,pru:40.22,cours:38.98}]},
"Métaux":{sante:"8,0",positions:[{titre:"50 Pesos Mexicain (Or)",ticker:"50PESO",qty:1,pru:0,cours:5150}]}}};

// ══════════════ STATE ══════════════
let D=null,H=[],tab="home",sel=null;
let st={loading:false,lastUp:null,ok:null,count:0,sync:null};
let cd=60,cdTimer=null;

// ══════════════ UTILS ══════════════
const fmt_=n=>new Intl.NumberFormat("fr-FR",{maximumFractionDigits:0}).format(n||0);
const fmt2_=n=>new Intl.NumberFormat("fr-FR",{maximumFractionDigits:2}).format(n||0);
const fP=n=>(n>0?"+":"")+(n||0).toFixed(1)+"%";
const fL=n=>(n>=0?"+":"")+fmt_(n)+" €";
const pn=s=>parseFloat(String(s||0).replace(/\s/g,"").replace(",","."))||0;
const sC=s=>{const n=parseFloat(String(s).replace(",","."));return n>=8?"g":n>=6?"a":"r"};

function rc(d){const eurUsd=d.eurUsd||1.1;Object.values(d.poches).forEach(p=>{p.positions.forEach(x=>{const rate=(CUR[x.ticker]==="USD")?eurUsd:1;x.valeur=(x.qty*x.cours)/rate;x.pl=(x.qty*(x.cours-x.pru))/rate;x.plPct=x.pru?((x.cours-x.pru)/x.pru*100):0});p.investi=p.positions.reduce((s,x)=>{const rate=(CUR[x.ticker]==="USD")?eurUsd:1;return s+(x.qty*x.pru)/rate},0);p.valeur=p.positions.reduce((s,x)=>s+x.valeur,0);p.pl=p.valeur-p.investi;const t=p.valeur||1;p.positions.forEach(x=>{x.poids=Math.round(x.valeur/t*1000)/10})});d.immobilier.equityNette=d.immobilier.valeurEstimee-d.immobilier.capitalRestant;d.updatedAt=new Date().toLocaleDateString("fr-FR")+" "+new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});return d}

// ══════════════ SYNC (JSONBIN) ══════════════
async function createBin(){
  try{
    const r=await fetch("https://api.jsonbin.io/v3/b",{method:"POST",headers:{"Content-Type":"application/json","X-Master-Key":JSONBIN_KEY,"X-Bin-Name":"portfolio","X-Bin-Private":"false"},body:JSON.stringify({data:D,hist:H})});
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    const j=await r.json();
    BIN_ID=j.metadata.id;
    localStorage.setItem("pf-bin-id",BIN_ID);
    console.log("Bin créé:",BIN_ID);
    return true;
  }catch(e){console.error("createBin:",e);return false}
}

async function pushToBin(){
  if(!BIN_ID){const ok=await createBin();return ok}
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":JSONBIN_KEY},body:JSON.stringify({data:D,hist:H.slice(-300)})});
    st.sync=r.ok;
    return r.ok;
  }catch(e){console.error("push:",e);st.sync=false;return false}
}

async function pullFromBin(){
  if(!BIN_ID)return false;
  try{
    // Public bins don't need auth - avoids CORS preflight
    const r=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`);
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    const j=await r.json();
    if(j.record&&j.record.data){D=j.record.data;if(j.record.hist)H=j.record.hist;st.sync=true;return true}
  }catch(e){console.error("pull:",e);st.sync=false}
  return false;
}

const saveLocal=()=>{try{localStorage.setItem("pf-data",JSON.stringify(D));localStorage.setItem("pf-hist",JSON.stringify(H.slice(-300)))}catch{}};
const loadLocal=()=>{try{const d=localStorage.getItem("pf-data");const h=localStorage.getItem("pf-hist");return{D:d?JSON.parse(d):null,H:h?JSON.parse(h):[]}}catch{return{D:null,H:[]}}};

async function save(){rc(D);saveLocal();R();pushToBin();}

// ══════════════ PRICE FETCH ══════════════
async function fetchCrypto(){
  const ids=Object.values(CG).join(",");
  // Try CoinGecko direct first
  try{
    const r=await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd`);
    if(!r.ok)throw new Error("CG "+r.status);
    const d=await r.json();const p={};
    Object.entries(CG).forEach(([t,id])=>{if(d[id]?.usd)p[t]=d[id].usd});
    if(Object.keys(p).length)return p;
  }catch(e){console.log("CG direct fail:",e.message)}
  // Fallback: use Binance public API (no CORS issues)
  try{
    const BINANCE={SOL:"SOLUSDT",BTC:"BTCUSDT",HYPE:"HYPEUSDT"};
    const p={};
    const r=await fetch("https://api.binance.com/api/v3/ticker/price");
    if(!r.ok)throw new Error("Binance "+r.status);
    const arr=await r.json();
    Object.entries(BINANCE).forEach(([tkr,sym])=>{
      const item=arr.find(x=>x.symbol===sym);
      if(item)p[tkr]=parseFloat(item.price);
    });
    return p;
  }catch(e){console.log("Binance fail:",e.message);throw e}
}

async function fetchStocks(){
  // Finnhub API - free tier, 60 calls/min, US stocks only
  const FINNHUB_KEY="d7gas19r01qqb8rivk70d7gas19r01qqb8rivk7g";
  const US_TICKERS=["GOOGL","NVDA","NBIS","ASTS","RKLB","TSM","KRKNF","OKLO","NVTS","RDW","ONDS","QBTS"];
  const p={};
  for(const tkr of US_TICKERS){
    try{
      const r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${tkr}&token=${FINNHUB_KEY}`);
      if(r.ok){
        const j=await r.json();
        if(j.c&&j.c>0)p[tkr]=j.c;
      }
    }catch(e){console.log(`${tkr} fail:`,e.message)}
    await new Promise(res=>setTimeout(res,100));
  }
  if(Object.keys(p).length===0)throw new Error("No prices");
  return p;
}

// Alpha Vantage for EU stocks - 25 calls/day limit, 5/min
// Uses .PA suffix for Paris (Euronext), .AS for Amsterdam
async function fetchEuStocks(){
  const AV_KEY="00W280M7CIGG84L4";
  const AV_TICKERS={AI:"AI.PA",SU:"SU.PA",VCT:"VCT.PA",VIE:"VIE.PA",WKL:"WKL.AS",VU:"VU.PA"};
  const p={};
  for(const [tkr,sym] of Object.entries(AV_TICKERS)){
    try{
      const r=await fetch(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${sym}&apikey=${AV_KEY}`);
      if(r.ok){
        const j=await r.json();
        const price=parseFloat(j["Global Quote"]?.["05. price"]);
        if(price>0)p[tkr]=price;
        // Stop if we hit rate limit
        if(j.Note||j.Information){console.log("AV limit:",j.Note||j.Information);break}
      }
    }catch(e){console.log(`AV ${tkr} fail:`,e.message)}
    // 15 sec delay to stay under 5/min limit
    await new Promise(res=>setTimeout(res,15000));
  }
  return p;
}

async function fetchEurUsd(){
  try{
    const r=await fetch("https://api.exchangerate-api.com/v4/latest/EUR");
    if(r.ok){const j=await r.json();return j.rates?.USD}
  }catch{}
  return null;
}

async function fetchGold(){
  // Gold price in EUR per ounce from various sources - use 50 Pesos market price
  // 50 Pesos Mexicain contient 37.5g d'or pur
  try{
    // Metals-API fallback: use a simple gold price API
    const r=await fetch("https://api.gold-api.com/price/XAU");
    if(r.ok){
      const j=await r.json();
      if(j.price){
        // j.price is USD per ounce. Convert to EUR per 37.5g coin
        // 1 oz = 31.1035g, so 37.5g = 1.2056 oz
        const usdPerOz=j.price;
        const eurUsd=D.eurUsd||1.1;
        const eurPerCoin=(usdPerOz*1.2056)/eurUsd;
        return Math.round(eurPerCoin);
      }
    }
  }catch{}
  return null;
}

async function refreshPrices(){
  if(st.loading)return;
  st.loading=true;R();
  let cnt=0,ok=false;
  const nd=JSON.parse(JSON.stringify(D));

  // Crypto
  try{
    const cp=await fetchCrypto();
    nd.poches.Crypto.positions.forEach(p=>{if(cp[p.ticker]!=null){p.cours=cp[p.ticker];cnt++}});
    ok=true;
  }catch(e){console.log("crypto fail:",e)}

  // US Stocks (Finnhub) - every refresh
  try{
    const sp=await fetchStocks();
    Object.values(nd.poches).forEach(p=>p.positions.forEach(pos=>{
      if(sp[pos.ticker]!=null){pos.cours=sp[pos.ticker];cnt++}
    }));
    ok=true;
  }catch(e){console.log("stocks fail:",e)}

  // EU Stocks (Alpha Vantage) - runs on first refresh after 9h45, 13h00, 17h40
  // Uses last-refresh-date to trigger once per slot (persistent across app restarts)
  try{
    const now=new Date();
    const hm=now.getHours()*60+now.getMinutes();
    const slots=[9*60+45, 13*60+0, 17*60+40]; // minutes since midnight
    const today=now.toISOString().slice(0,10);
    const lastAV=localStorage.getItem("pf-last-av")||"";
    // Find the most recent slot that has passed today and that we haven't processed yet
    let shouldRun=false,slotKey="";
    for(let i=slots.length-1;i>=0;i--){
      if(hm>=slots[i]){
        const key=`${today}-${slots[i]}`;
        if(lastAV!==key){
          shouldRun=true;
          slotKey=key;
        }
        break; // only check most recent passed slot
      }
    }
    if(shouldRun){
      console.log("AV refresh triggered for slot",slotKey);
      const eup=await fetchEuStocks();
      Object.values(nd.poches).forEach(p=>p.positions.forEach(pos=>{
        if(eup[pos.ticker]!=null){pos.cours=eup[pos.ticker];cnt++}
      }));
      if(Object.keys(eup).length>0)localStorage.setItem("pf-last-av",slotKey);
    }
  }catch(e){console.log("EU stocks fail:",e)}

  // EUR/USD
  try{
    const r=await fetchEurUsd();
    if(r)nd.eurUsd=Math.round(r*10000)/10000;
  }catch{}

  // Gold (50 Pesos)
  try{
    const gp=await fetchGold();
    if(gp&&nd.poches["Métaux"]){
      const coin=nd.poches["Métaux"].positions.find(p=>p.ticker==="50PESO");
      if(coin){coin.cours=gp;cnt++}
    }
  }catch{}

  D=rc(nd);
  const now=new Date();
  const ts=now.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  st.lastUp=ts;st.ok=ok;st.count=cnt;st.loading=false;

  // Add history point
  const tv=Object.values(D.poches).reduce((s,p)=>s+p.valeur,0)+D.cash;
  const tp=Object.values(D.poches).reduce((s,p)=>s+p.pl,0);
  H.push({t:now.getTime(),v:Math.round(tv),pl:Math.round(tp),h:ts.slice(0,5)});

  saveLocal();R();pushToBin();
  cd=900; // 15 min countdown
}

// ══════════════ INIT ══════════════
async function init(){
  const loc=loadLocal();
  // Always pull from shared bin first - this ensures Mac/iPhone stay in sync
  const pulled=await pullFromBin();
  if(!pulled){
    // JSONBin unreachable, fall back to local or default
    if(loc.D){D=loc.D;H=loc.H||[]}
    else{D=JSON.parse(JSON.stringify(DEF));H=[]}
  }
  // Apply monthly mortgage payments (1st of each month)
  applyMortgagePayments();
  // Migrate portfolio positions if needed (new buys, PRU updates)
  const migrated=applyPortfolioMigrations();
  rc(D);R();
  if(migrated)pushToBin();
  refreshPrices();
  // Auto refresh 15 min (900000 ms)
  setInterval(refreshPrices,900000);
  // Check mortgage payments every hour (handles midnight transitions)
  setInterval(()=>{if(applyMortgagePayments()){rc(D);R();pushToBin()}},3600000);
  // Countdown
  if(cdTimer)clearInterval(cdTimer);
  cd=900;
  cdTimer=setInterval(()=>{cd=Math.max(0,cd-1);if(cd<=0)cd=900;updateCountdown()},1000);
}

// Portfolio migrations - apply position changes that need to propagate across devices
function applyPortfolioMigrations(){
  if(!D||!D.poches||!D.poches.PEA)return false;
  const pea=D.poches.PEA.positions;
  let changed=false;
  // Migration 2026-04-24: add Vusion + update Veolia qty/pru
  if(!D.migV1){
    // Add Vusion if not already present
    if(!pea.find(p=>p.ticker==="VU")){
      pea.push({titre:"Vusion",ticker:"VU",qty:5,pru:143.30,cours:143.30});
      changed=true;
    }
    // Update Veolia to 70 shares at 33.917 PRU - only if still at old qty
    const vie=pea.find(p=>p.ticker==="VIE");
    if(vie&&vie.qty<70){
      vie.qty=70;
      vie.pru=33.917;
      changed=true;
    }
    D.migV1=true;
    changed=true;
  }
  // Migration 2026-04-24 bis: pre-record CDC-D sale (141.13 parts @ PRU 6.40 for 1807.40€ net)
  if(!D.migV2){
    if(!D.sales)D.sales=[];
    // Only add if not already recorded
    const alreadyExists=D.sales.some(s=>s.ticker==="CDC-D"&&Math.abs(s.qty-141.13)<0.01);
    if(!alreadyExists){
      D.sales.push({date:"2026-04-24",poche:"PEE",ticker:"CDC-D",titre:"CDC Diversifié ISR",qty:141.13,pru:6.40,net:1807.40,brut:1909.24,pl:904.17});
    }
    // Update CDC-D qty in PEE if still at old value
    if(D.poches.PEE){
      const cdcd=D.poches.PEE.positions.find(p=>p.ticker==="CDC-D");
      if(cdcd&&cdcd.qty>93.5)cdcd.qty=93.1;
    }
    D.migV2=true;
    changed=true;
  }
  // Migration 2026-04-24 ter: add 2025 historical P&L realized total
  if(!D.migV3){
    if(!D.sales)D.sales=[];
    const histExists=D.sales.some(s=>s.ticker==="HIST-2025");
    if(!histExists){
      D.sales.push({date:"2025-12-31",poche:"Historique",ticker:"HIST-2025",titre:"P&L réalisé 2025 (cumul)",qty:1,pru:0,net:722.40,brut:722.40,pl:722.40});
    }
    D.migV3=true;
    changed=true;
  }
  return changed;
}

function applyMortgagePayments(){
  if(!D||!D.immobilier)return false;
  // Force migration: if old (incorrect) PTZ values detected, reset to correct ones
  if(D.immobilier.mortgage&&D.immobilier.mortgage.ptzCapital<20000){
    delete D.immobilier.mortgage;
    D.immobilier.capitalRestant=151752.90;
  }
  // Initialize mortgage data if not present
  if(!D.immobilier.mortgage){
    D.immobilier.mortgage={
      ptzCapital:29514.90,
      ptzMensualite:104.30,
      mainCapital:122238.00,
      mainMensualite:654.65,
      mainTaux:0.038,
      lastPayment:"2026-04-01" // avril 2026 déjà payé
    };
  }
  const m=D.immobilier.mortgage;
  const now=new Date();
  const last=new Date(m.lastPayment);
  let applied=false;
  // Advance month by month
  while(true){
    const next=new Date(last.getFullYear(),last.getMonth()+1,1);
    if(next>now)break;
    // Apply 1 month of amortization
    // PTZ: all in capital (0% rate)
    const ptzPay=Math.min(m.ptzMensualite,m.ptzCapital);
    m.ptzCapital=Math.max(0,m.ptzCapital-ptzPay);
    // Principal: interest + capital split
    const interest=m.mainCapital*(m.mainTaux/12);
    const capitalPart=Math.max(0,m.mainMensualite-interest);
    m.mainCapital=Math.max(0,m.mainCapital-capitalPart);
    // Update total capital restant dû
    D.immobilier.capitalRestant=Math.round((m.ptzCapital+m.mainCapital)*100)/100;
    m.lastPayment=next.toISOString().slice(0,10);
    last.setTime(next.getTime());
    applied=true;
  }
  return applied;
}

function dn(data,colors,sz=120){const tot=data.reduce((s,d)=>s+d[1],0)||1;let a=0;const g=.02,cx=sz/2,cy=sz/2,R=sz*.42,r=sz*.28;let p="";data.forEach((d,i)=>{const f=d[1]/tot;if(f<.001){a+=f;return}const s1=a*Math.PI*2-Math.PI/2+g,e1=(a+f)*Math.PI*2-Math.PI/2-g,l=f>.5?1:0;p+=`<path d="M${cx+R*Math.cos(s1)},${cy+R*Math.sin(s1)} A${R},${R} 0 ${l} 1 ${cx+R*Math.cos(e1)},${cy+R*Math.sin(e1)} L${cx+r*Math.cos(e1)},${cy+r*Math.sin(e1)} A${r},${r} 0 ${l} 0 ${cx+r*Math.cos(s1)},${cy+r*Math.sin(s1)} Z" fill="${colors[i%colors.length]}" opacity=".9"/>`;a+=f});return `<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}">${p}</svg>`;}

function lc(data,k,col,w=300,h=140){if(data.length<2)return`<div style="text-align:center;color:var(--dim);padding:30px;font-size:13px">En attente…</div>`;const vs=data.map(d=>d[k]),mn=Math.min(...vs),mx=Math.max(...vs),rg=mx-mn||1,pd=20,cw=w-pd*2,ch=h-pd*2;let pt="";vs.forEach((v,i)=>{const x=pd+(i/(vs.length-1))*cw,y=pd+ch-((v-mn)/rg*ch);pt+=(i?"L":"M")+x.toFixed(1)+","+y.toFixed(1)});const z=k==="pl"?pd+ch-((0-mn)/rg*ch):"";return`<svg width="100%" viewBox="0 0 ${w} ${h}">${z?`<line x1="${pd}" y1="${z}" x2="${w-pd}" y2="${z}" stroke="var(--mut)" stroke-dasharray="3 3"/>`:""}<path d="${pt}" fill="none" stroke="${col}" stroke-width="2" stroke-linecap="round"/><text x="${pd}" y="${h-2}" font-size="9" fill="var(--mut)">${data[0].h||""}</text><text x="${w-pd}" y="${h-2}" font-size="9" fill="var(--mut)" text-anchor="end">${data[data.length-1].h||""}</text><text x="${pd}" y="${pd-4}" font-size="9" fill="var(--mut)">${fmt_(mx)}</text></svg>`;}

<div style="display:flex;align-items:center;gap:16px;margin:0 0 16px">${dn(dd,DCOL,140)}<div style="flex:1;display:flex;flex-direction:column;gap:3px">${dd.map((d,i)=>`<div style="display:flex;align-items:center;gap:5px;font-size:10px"><div style="width:7px;height:7px;border-radius:50%;background:${DCOL[i%DCOL.length]}"></div><span style="color:var(--dim);flex:1">${d[0]}</span><span class="mono" style="font-weight:500">${((d[1]/dt)*100).toFixed(1)}%</span></div>`).join("")}</div></div>
${(()=>{const hasUsd=p.positions.some(x=>CUR[x.ticker]==="USD");const eurUsd=D.eurUsd||1.1;const investiUsd=p.positions.reduce((s,x)=>s+(CUR[x.ticker]==="USD"?x.qty*x.pru:x.qty*x.pru*eurUsd),0);const valeurUsd=p.positions.reduce((s,x)=>s+(CUR[x.ticker]==="USD"?x.qty*x.cours:x.qty*x.cours*eurUsd),0);const plUsd=valeurUsd-investiUsd;const pocheSales=(D.sales||[]).filter(s=>s.poche===sel);const realPL=pocheSales.reduce((s,v)=>s+v.pl,0);const hasSales=pocheSales.length>0;const cols=hasSales?4:3;const stats=[["Investi",fmt_(p.investi)+" €",null,hasUsd?fmt_(investiUsd)+" $":""],["Valeur",fmt_(p.valeur)+" €",null,hasUsd?fmt_(valeurUsd)+" $":""],["P&L latent",fL(p.pl),ip?"var(--grn)":"var(--red)",hasUsd?(plUsd>=0?"+":"")+fmt_(plUsd)+" $":""]];if(hasSales)stats.push(["P&L réalisé",fL(realPL),realPL>=0?"var(--grn)":"var(--red)",pocheSales.length+" vente"+(pocheSales.length>1?"s":"")]);return `<div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:6px;margin-bottom:16px">${stats.map(m=>`<div style="background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:8px;text-align:center"><div style="font-size:9px;color:var(--dim);text-transform:uppercase">${m[0]}</div><div class="mono" style="font-size:12px;font-weight:600;${m[2]?"color:"+m[2]:""};margin-top:3px">${m[1]}</div>${m[3]?`<div class="mono" style="font-size:9px;color:var(--mut);margin-top:1px">${m[3]}</div>`:""}</div>`).join("")}</div>`})()}
<div class="card" style="padding:4px 12px 6px">`;
p.positions.forEach((x,i)=>{const xp=x.pl>=0;const isUsd=CUR[x.ticker]==="USD";const eurUsd=D.eurUsd||1.1;const valUsd=x.qty*x.cours;const plUsd=x.qty*(x.cours-x.pru);
h+=`<div style="display:grid;grid-template-columns:1fr auto auto;gap:6px;align-items:center;padding:8px 0;cursor:pointer;${i<p.positions.length-1?"border-bottom:1px solid #1e203022":""}" onclick="ePos('${sel}','${x.ticker}')">
<div><div style="font-size:12px;font-weight:600">${x.ticker} <span style="color:var(--acc);font-size:9px">✎</span></div><div style="font-size:10px;color:var(--dim)">${x.titre}</div><div style="font-size:9px;color:var(--mut)">${x.qty} × ${fmt2_(x.cours)}${isUsd?"$":"€"}${x.cible?" · Cible: "+fmt2_(x.cible)+(isUsd?"$":"€"):""}</div></div>
<div style="text-align:right"><div class="mono" style="font-size:12px;font-weight:500">${fmt_(x.valeur)} €</div>${isUsd?`<div class="mono" style="font-size:9px;color:var(--mut)">${fmt_(valUsd)} $</div>`:""}<div style="font-size:10px;color:var(--dim)">${x.poids}%</div></div>
<div style="text-align:right;min-width:55px"><div class="mono" style="font-size:11px;font-weight:600;color:${xp?"var(--grn)":"var(--red)"}">${fP(x.plPct)}</div><div style="font-size:9px;color:${xp?"#34d39999":"#f8717199"}">${fL(x.pl)}</div>${isUsd?`<div style="font-size:8px;color:var(--mut)">${plUsd>=0?"+":""}${fmt_(plUsd)} $</div>`:""}</div></div>`;});
h+=`</div><div class="add-btn" onclick="aPos('${sel}')">+ Ajouter une position</div></div>`;}

if(tab==="analyse"){const d=ga();
const sm_={};d.ap.forEach(p=>{const s=SECTORS[p.ticker]||"Autre";sm_[s]=(sm_[s]||0)+p.valeur});const sd=Object.entries(sm_).map(([n,v])=>[n,Math.round(v)]).sort((a,b)=>b[1]-a[1]);const scol=sd.map(d=>SCOL[d[0]]||"var(--mut)");
const cm_={EUR:D.cash,USD:0};d.ap.forEach(p=>{const c=CUR[p.ticker]||"EUR";cm_[c]=(cm_[c]||0)+p.valeur});const cdat=Object.entries(cm_).map(([n,v])=>[n,Math.round(v)]);const ct=cdat.reduce((s,x)=>s+x[1],0)||1;
const tg=D.targetAlloc||{};const ad=d.al.map(a=>({n:a[0],v:a[1],ac:a[1]/d.tF*100,tg:tg[a[0]]||0})).map(a=>({...a,dv:a.ac-a.tg}));
const dp=d.ap.filter(p=>DIVS[p.ticker]>0).map(p=>({...p,dv:DIVS[p.ticker],dt:p.qty*DIVS[p.ticker],yd:DIVS[p.ticker]/p.cours*100}));const td=dp.reduce((s,p)=>s+p.dt,0);
const sc2=d.ap.map(p=>{let s=5;if(p.plPct>20)s+=2;else if(p.plPct>5)s+=1;else if(p.plPct<-15)s-=2;else if(p.plPct<-5)s-=1;if(p.cible){const e=(p.cours-p.cible)/p.cible*100;if(e>0&&e<10)s+=1;if(e<-5)s-=1}if(p.poids>30)s-=1;return{...p,sc:Math.max(1,Math.min(10,Math.round(s*10)/10))}}).sort((a,b)=>b.sc-a.sc);
h+=`<div class="fade"><h2 style="font-size:18px;font-weight:700;margin-bottom:14px">Analyse</h2>
<div class="card"><div class="section">Secteurs</div><div style="display:flex;align-items:center;gap:10px">${dn(sd,scol,100)}<div style="flex:1;display:flex;flex-direction:column;gap:3px">${sd.map((d,i)=>`<div style="display:flex;align-items:center;gap:5px;font-size:10px"><div style="width:6px;height:6px;border-radius:50%;background:${scol[i]}"></div><span style="color:var(--dim);flex:1">${d[0]}</span><span class="mono" style="font-weight:500">${fmt_(d[1])}€</span></div>`).join("")}</div></div></div>
<div class="card"><div class="section">Devises</div><div style="display:flex;gap:8px">${cdat.map(d=>{const pc=d[1]/ct*100;return`<div style="flex:1;text-align:center"><div class="mono" style="font-size:20px;font-weight:700;color:${d[0]==="EUR"?"var(--acc)":"var(--grn)"}">${pc.toFixed(0)}%</div><div style="font-size:12px;font-weight:600;margin-top:2px">${d[0]}</div><div style="font-size:10px;color:var(--dim)">${fmt_(d[1])} €</div><div style="margin-top:6px;height:6px;background:var(--bdr);border-radius:3px;overflow:hidden"><div style="height:100%;width:${pc}%;background:${d[0]==="EUR"?"var(--acc)":"var(--grn)"};border-radius:3px"></div></div></div>`}).join("")}</div></div>
<div class="card"><div class="section">Cible vs Actuel</div>${ad.map(a=>{const cl=Math.abs(a.dv)>5?"var(--red)":Math.abs(a.dv)>2?"var(--amb)":"var(--grn)";return`<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;font-size:10px"><span style="width:70px;color:var(--dim);font-size:9px">${a.n}</span><div style="flex:1;height:5px;background:var(--bdr);border-radius:3px;position:relative;overflow:hidden"><div style="position:absolute;left:${Math.min(a.tg,a.ac)}%;width:${Math.abs(a.dv)}%;height:100%;background:${cl}44"></div><div style="position:absolute;left:${a.ac}%;width:3px;height:100%;background:${PCOL[a.n]||"var(--acc)"};border-radius:2px"></div></div><span class="mono" style="font-size:10px;width:30px;text-align:right;color:${cl}">${a.dv>0?"+":""}${a.dv.toFixed(1)}</span></div>`}).join("")}</div>
<div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><div class="section" style="margin:0">Dividendes</div><span class="mono" style="font-size:13px;font-weight:700;color:var(--grn)">${fmt_(td)} €/an</span></div>${dp.map(p=>`<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:10px"><span style="color:var(--dim)">${p.ticker}</span><span class="mono"><span style="color:var(--grn)">${fmt_(p.dt)}€</span> <span style="color:var(--mut)">(${p.yd.toFixed(1)}%)</span></span></div>`).join("")}</div>
<div class="card"><div class="section">Score santé</div>${sc2.map(p=>{const cl=p.sc>=7?"var(--grn)":p.sc>=5?"var(--amb)":"var(--red)";return`<div style="display:flex;align-items:center;gap:5px;padding:3px 0;font-size:10px"><span style="font-weight:600;width:45px">${p.ticker}</span><div style="flex:1;height:4px;background:var(--bdr);border-radius:2px;overflow:hidden"><div style="height:100%;width:${p.sc*10}%;background:${cl};border-radius:2px"></div></div><span class="mono" style="color:${cl};width:22px;text-align:right">${p.sc}</span></div>`}).join("")}</div></div>`;}

if(tab==="alerts"){const d=ga();const un=d.alerts.filter(a=>a.at),nr=d.alerts.filter(a=>a.nr),ab=d.alerts.filter(a=>!a.at&&!a.nr);
h+=`<div class="fade"><h2 style="font-size:18px;font-weight:700;margin-bottom:14px">Alertes</h2>`;
if(un.length){h+=`<div style="font-size:11px;color:var(--red);font-weight:600;margin-bottom:6px">🔴 Sous la cible</div>`;un.forEach(a=>{h+=`<div class="card" style="border-color:#f8717144"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:14px;font-weight:700">${a.ticker}</div><div style="font-size:10px;color:var(--dim)">${a.titre} · ${a.poche}</div></div><div style="text-align:right"><div class="mono" style="font-size:13px;font-weight:600;color:var(--red)">${fmt2_(a.cours)}</div><div style="font-size:10px;color:var(--dim)">Cible: ${fmt2_(a.cible)}</div><div class="mono" style="font-size:10px;color:var(--grn)">↓${Math.abs(a.ec).toFixed(1)}%</div></div></div></div>`})}
if(nr.length){h+=`<div style="font-size:11px;color:var(--amb);font-weight:600;margin:10px 0 6px">🟡 Proche</div>`;nr.forEach(a=>{h+=`<div class="card" style="border-color:#fbbf2444"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:13px;font-weight:600">${a.ticker}</div><div style="font-size:10px;color:var(--dim)">${a.titre}</div></div><div style="text-align:right"><div class="mono" style="font-size:12px">${fmt2_(a.cours)}</div><div style="font-size:10px;color:var(--amb)">↑${a.ec.toFixed(1)}%</div></div></div></div>`})}
if(ab.length){h+=`<div style="font-size:11px;color:var(--dim);font-weight:600;margin:10px 0 6px">⚪ Au-dessus</div>`;
ab.forEach(a=>{h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:12px;font-weight:600">${a.ticker}</div><div style="font-size:10px;color:var(--dim)">${a.titre}</div></div><div style="text-align:right"><div class="mono" style="font-size:11px">${fmt2_(a.cours)}</div><div style="font-size:10px;color:var(--mut)">+${a.ec.toFixed(1)}%</div></div></div></div>`});}
if(!d.alerts.length)h+=`<div style="text-align:center;color:var(--mut);padding:40px">Aucune cible définie</div>`;
h+=`</div>`;}

if(tab==="history"){const r=H.slice(-60);
h+=`<div class="fade"><h2 style="font-size:18px;font-weight:700;margin-bottom:14px">Historique</h2>
<div class="card"><div class="section">Valeur</div>${lc(r,"v","#6c8cff")}</div>
<div class="card"><div class="section">P&L</div>${lc(r,"pl","#34d399")}</div></div>`;}

$.innerHTML=h;
// Nav
const tabs=[["home","Vue"],["analyse","Analyse"],["alerts","Alertes"],["history","Hist."]];
document.getElementById("nav").innerHTML=tabs.map(t=>{const ac=tab===t[0]||(tab==="detail"&&t[0]==="home");return`<button class="nav-btn${ac?" active":""}" onclick="gt('${t[0]}')"><span style="font-size:14px;font-weight:${ac?700:400}">${t[1]}</span>${t[0]==="alerts"&&ga().nA?'<div style="position:absolute;top:2px;right:4px;width:6px;height:6px;border-radius:50%;background:var(--red)"></div>':""}${ac?'<div style="width:20px;height:2px;background:var(--acc);border-radius:1px;margin-top:1px"></div>':""}</button>`}).join("");
}

window.gt=id=>{if(id==="home")sel=null;tab=id;R();scrollTo(0,0)};
window.oP=n=>{sel=n;tab="detail";R();scrollTo(0,0)};
window.aEnv=()=>{const n=prompt("Nom de la nouvelle enveloppe:");if(!n)return;if(D.poches[n])return alert("Existe déjà");D.poches[n]={sante:"7,0",positions:[]};save()};
window.refreshPrices=refreshPrices;

// ══════════════ START ══════════════
init();
</script>
